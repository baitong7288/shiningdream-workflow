document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5E 0 16.66%,#FF924C 16.66% 33.33%,#FFCA3A 33.33% 50%,#7DC93E 50% 66.66%,#2E97D6 66.66% 83.33%,#7A5BB0 83.33% 100%);\n\n      position:relative;\n      background:var(--bg);\n      color:var(--ink);\n      font-family:'Sarabun', sans-serif;\n      min-height:100vh;\n      padding:30px 20px 70px;\n      overflow:hidden;\n    }\n    /* subtle dotted paper pattern */\n    .app::before{\n      content:''; position:absolute; inset:0; z-index:0; pointer-events:none;\n      background-image:radial-gradient(circle, rgba(255,170,70,.10) 1.6px, transparent 1.7px);\n      background-size:24px 24px;\n    }\n    .app.clean{\n      --bg:#FFFCF6;\n      --line:#F0E7DA;\n      --line-soft:#FAF4EA;\n      --card-radius:16px;\n      --card-shadow:0 12px 34px -18px rgba(71,51,41,.3);\n    }\n    .app.clean::before{ background-image:radial-gradient(circle, rgba(255,170,70,.05) 1.4px, transparent 1.5px); background-size:30px 30px; }\n\n    .wrap{ max-width:1180px; margin:0 auto; position:relative; z-index:2; }\n\n    /* ===== Decorations ===== */\n    .deco{ position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; }\n    .deco span{ position:absolute; line-height:1; filter:drop-shadow(0 6px 10px rgba(71,51,41,.12)); }\n    .deco .d-rainbow{ top:-26px; right:-10px; font-size:150px; transform:rotate(8deg); opacity:.9; }\n    .deco .d-cloud1{ top:120px; left:-14px; font-size:84px; opacity:.85; animation:floaty 7s ease-in-out infinite; }\n    .deco .d-cloud2{ bottom:60px; right:30px; font-size:70px; opacity:.7; animation:floaty 9s ease-in-out infinite .8s; }\n    .deco .d-s1{ top:90px;  left:44%; font-size:30px; animation:twinkle 3.2s ease-in-out infinite; }\n    .deco .d-s2{ top:240px; right:42%; font-size:22px; animation:twinkle 2.6s ease-in-out infinite .6s; }\n    .deco .d-s3{ top:420px; left:8%;  font-size:26px; animation:twinkle 3.6s ease-in-out infinite 1.1s; }\n    .deco .d-s4{ bottom:130px; left:46%; font-size:20px; animation:twinkle 3s ease-in-out infinite .3s; }\n    .app.clean .deco span{ opacity:.18 !important; filter:none; animation:none !important; }\n    .app.clean .deco .d-rainbow{ opacity:.32 !important; }\n    .app.clean .deco .d-s1,.app.clean .deco .d-s2,.app.clean .deco .d-s3,.app.clean .deco .d-s4{ display:none; }\n    @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }\n    @keyframes twinkle{ 0%,100%{ transform:scale(.8) rotate(-6deg); opacity:.5; } 50%{ transform:scale(1.15) rotate(6deg); opacity:1; } }\n\n    /* ===== Header ===== */\n    .topbar{ display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:24px; }\n    .brand-eyebrow{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; letter-spacing:.06em; color:var(--red-deep); font-family:'Mali',sans-serif; font-weight:600; margin:0 0 6px; }\n    .brand-title{ font-family:'Mali',sans-serif; font-weight:700; font-size:30px; margin:0; color:var(--ink); line-height:1.15; }\n    .brand-title .em{ color:var(--red); }\n    .brand-sub{ font-size:13.5px; color:var(--ink-soft); margin:6px 0 0; }\n    .head-right{ display:flex; flex-direction:column; align-items:flex-end; gap:10px; }\n    .theme-switch{ display:inline-flex; background:var(--paper); border:2px solid var(--line); border-radius:999px; padding:4px; gap:4px; box-shadow:var(--card-shadow); }\n    .theme-switch button{ font-family:'Mali',sans-serif; font-weight:600; font-size:13px; border:none; background:none; color:var(--ink-soft); padding:7px 15px; border-radius:999px; cursor:pointer; transition:.15s; }\n    .theme-switch button.active{ background:var(--red); color:#fff; box-shadow:0 3px 0 var(--red-deep); }\n    .app.clean .theme-switch button.active{ box-shadow:none; }\n    .reset-link{ font-size:12.5px; color:var(--ink-soft); background:none; border:none; cursor:pointer; text-decoration:underline; padding:2px 4px; font-family:'Sarabun',sans-serif; }\n    .reset-link:hover{ color:var(--red); }\n\n y\">\n        <div class=\"form-grid\">\n          <div class=\"form-field full\">\n            <label>ประเภทงาน<\u002Flabel>\n            <div class=\"type-toggle\">\n              <div class=\"type-opt\" id=\"typeOptBid\" data-type=\"กดบัตร\">กดบัตร<\u002Fdiv>\n              <div class=\"type-opt\" id=\"typeOptForm\" data-type=\"กรอกฟอร์ม\">กรอกฟอร์ม<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-field\"><label>วันที่<\u002Flabel><input type=\"date\" id=\"f_date\"><\u002Fdiv>\n          <div class=\"form-field\"><label>เวลา<\u002Flabel><input type=\"text\" id=\"f_time\" placeholder=\"เช่น 12:00 หรือ 9:00 (รับคิว)\"><\u002Fdiv>\n          <div class=\"form-field full\"><label>ชื่องาน (event)<\u002Flabel><input type=\"text\" id=\"f_event\" list=\"eventList\" placeholder=\"ชื่องาน/ศิลปิน\"><\u002Fdiv>\n          <datalist id=\"eventList\"><\u002Fdatalist>\n          <div class=\"form-field\" id=\"websiteField\"><label>website<\u002Flabel><input type=\"text\" id=\"f_website\" list=\"websiteList\" placeholder=\"เลือกหรือพิมพ์เอง\"><\u002Fdiv>\n          <datalist id=\"websiteList\">\n            <option value=\"Thaiticketmajor\"><\u002Foption><option value=\"Allticket\"><\u002Foption><option value=\"Ticketmelon\"><\u002Foption>\n            <option value=\"Eventpop\"><\u002Foption><option value=\"PB\"><\u002Foption><option value=\"ETC\"><\u002Foption>\n          <\u002Fdatalist>\n          <div class=\"form-field\" id=\"customersNumField\"><label>จำนวนลูกค้า<\u002Flabel><div class=\"num-stepper\"><button type=\"button\" class=\"step-btn\" data-step=\"-1\" data-target=\"f_customers\">−<\u002Fbutton><input type=\"number\" id=\"f_customers\" min=\"0\" step=\"1\" value=\"1\"><button type=\"button\" class=\"step-btn\" data-step=\"1\" data-target=\"f_customers\">+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"form-field full hidden\" id=\"clientsField\">\n            <label>รายชื่อลูกค้า <span id=\"clientsCountLabel\" style=\"font-weight:400;color:var(--ink-soft);\"><\u002Fspan><\u002Flabel>\n            <div class=\"clients-list\" id=\"clientsList\"><\u002Fdiv>\n            <button type=\"button\" class=\"btn btn-ghost btn-sm\" id=\"addClientBtn\" style=\"margin-top:8px;\">+ เพิ่มลูกค้า<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"form-field\"><label>ผลลัพธ์<\u002Flabel>\n            <select id=\"f_result\">\n              <option value=\"coming\">coming<\u002Foption>\n              <option value=\"ได้\">ได้<\u002Foption>\n              <option value=\"ไม่ได้\">ไม่ได้<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"form-field\"><label>จำนวนใบที่ได้ (All)<\u002Flabel><div class=\"num-stepper\"><button type=\"button\" class=\"step-btn\" data-step=\"-1\" data-target=\"f_tickets\">−<\u002Fbutton><input type=\"number\" id=\"f_tickets\" min=\"0\" step=\"1\" value=\"0\"><button type=\"button\" class=\"step-btn\" data-step=\"1\" data-target=\"f_tickets\">+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"form-field\" id=\"ouyField\"><label>ออย (ใบ)<\u002Flabel><div class=\"num-stepper\"><button type=\"button\" class=\"step-btn\" data-step=\"-1\" data-target=\"f_ouy\">−<\u002Fbutton><input type=\"number\" id=\"f_ouy\" min=\"0\" step=\"1\" value=\"0\"><button type=\"button\" class=\"step-btn\" data-step=\"1\" data-target=\"f_ouy\">+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"form-field\" id=\"yoField\"><label>โย (ใบ)<\u002Flabel><div class=\"num-stepper\"><button type=\"button\" class=\"step-btn\" data-step=\"-1\" data-target=\"f_yo\">−<\u002Fbutton><input type=\"number\" id=\"f_yo\" min=\"0\" step=\"1\" value=\"0\"><button type=\"button\" class=\"step-btn\" data-step=\"1\" data-target=\"f_yo\">+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"form-field\" id=\"outongField\"><label>ออ+ตองรวม (ใบ)<\u002Flabel><div class=\"num-stepper\"><button type=\"button\" class=\"step-btn\" data-step=\"-1\" data-target=\"f_outong\">−<\u002Fbutton><input type=\"number\" id=\"f_outong\" min=\"0\" step=\"1\" value=\"0\"><button type=\"button\" class=\"step-btn\" data-step=\"1\" data-target=\"f_outong\">+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"form-field\"><label>ยกเลิก (ยอดรวม)<\u002Flabel><input type=\"number\" id=\"f_cancel\" min=\"0\" step=\"1\" value=\"0\"><\u002Fdiv>\n          <div class=\"form-field\"><label>tip (ยอดรวม)<\u002Flabel><input type=\"number\" id=\"f_tip\" min=\"0\" step=\"1\" value=\"0\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"preview-box\">\n          <div class=\"pr-title\">คำนวณอัตโนมัติ<\u002Fdiv>\n          <div class=\"preview-grid\">\n            <div>รายได้ทั้งหมด<b id=\"pv_total\">฿0<\u002Fb><\u002Fdiv>\n            <div>commission<b id=\"pv_comm\">฿0<\u002Fb><\u002Fdiv>\n            <div>รวม ออ+ตอง<b id=\"pv_outong\">฿0<\u002Fb><\u002Fdiv>\n            <div>รายได้ออย<b id=\"pv_ouy\">฿0<\u002Fb><\u002Fdiv>\n            <div>รายได้โย<b id=\"pv_yo\">฿0<\u002Fb><\u002Fdiv>\n            <div>เฉลี่ย ออ+ตอง<b id=\"pv_avg\">฿0<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"modal-foot\">\n        <button class=\"btn btn-ghost\" id=\"formCancelBtn\">ยกเลิก<\u002Fbutton>\n        <button class=\"btn btn-primary\" id=\"formSaveBtn\">บันทึกงาน<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"overlay\" id=\"confirmOverlay\">\n    <div class=\"modal confirm-box\">\n      <div class=\"big\" style=\"font-family:'Mali',sans-serif;font-size:18px;margin-bottom:4px;\" id=\"confirmTitle\">ยืนยันการลบ<\u002Fdiv>\n      <p id=\"confirmMsg\">ต้องการลบงานนี้หรือไม่ การลบไม่สามารถย้อนกลับได้<\u002Fp>\n      <div style=\"display:flex; gap:10px; justify-content:center;\">\n        <button class=\"btn btn-ghost\" id=\"confirmCancelBtn\">ยกเลิก<\u002Fbutton>\n        <button class=\"btn btn-danger\" id=\"confirmOkBtn\">ยืนยัน<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"overlay\" id=\"clientOverlay\">\n    <div class=\"modal\" style=\"max-width:480px;\">\n      <div class=\"modal-head\">\n        <h3 id=\"clientFormTitle\">เพิ่มลูกค้า<\u002Fh3>\n        <button class=\"modal-close\" id=\"clientCloseBtn\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"modal-body\">\n        <div class=\"form-grid\">\n          <div class=\"form-field full\"><label>ชื่อลูกค้า<\u002Flabel><input type=\"text\" id=\"c_name\" placeholder=\"ชื่อ / ชื่อเล่น / ไอดี\"><\u002Fdiv>\n          <div class=\"form-field full\"><label>แหล่งที่มา<\u002Flabel>\n            <select id=\"c_source\">\n              <option value=\"X\">X<\u002Foption>\n              <option value=\"Line OA\">Line OA<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"form-field full\">\n            <label>ข้อความ confirmation (ส่งให้ลูกค้าคนนี้)<\u002Flabel>\n            <textarea id=\"c_note\" rows=\"8\" placeholder=\"พิมพ์ข้อความยืนยันสำหรับลูกค้าคนนี้...\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div class=\"form-field full\">\n            <button type=\"button\" class=\"confirm-toggle\" id=\"c_confirmBtn\">⬜ จิ้มเมื่อคอนเฟิร์มเรียบร้อย พร้อมส่งต่อ<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"modal-foot\">\n        <button class=\"btn btn-ghost\" id=\"clientDeleteBtn\" style=\"margin-right:auto;color:var(--red-deep);\">ลบลูกค้านี้<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"clientCopyBtn\">📋 คัดลอก confirmation<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"clientCancelBtn\">ยกเลิก<\u002Fbutton>\n        <button class=\"btn btn-primary\" id=\"clientSaveBtn\">บันทึก<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"toast\" id=\"toast\"><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n\n  componentDidMount(){\n    if(this._init) return;\n    this._init = true;\n\n    const INITIAL_THEME = (this.props && this.props.theme) || 'cute';\n\n    const STORAGE_KEY = 'sd_jobs';\n    const SETTLE_KEY = 'sd_settlements';\n    let jobs = [];\n    let editingId = null;\n    let pendingDeleteId = null;\n    let pendingReset = false;\n    let calMonth = isoLocal(new Date()).slice(0,7);\n    let selectedDate = null;\n    let editingClients = [];\n    let editingClientId = null;\n    let editingClientConfirmed = false;\n    let settlements = {};\n\n    const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];\n\n    const $ = (id) => document.getElementById(id);\n    const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };\n    const baht = (v) => '฿' + Math.round(v).toLocaleString('th-TH');\n    const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);\n\n    /* ---------- Locked to \"จัดเต็ม\" (cute) ---------- */\n    const appEl = document.querySelector('.app');\n    appEl.classList.add('cute');\n    appEl.classList.remove('clean');\n\n    function calc(job){\n      const I = num(job.tickets), J = num(job.ouy), K = num(job.yo), L = num(job.outong);\n      const M = num(job.cancel), N = num(job.tip);\n      let total=0, ouyIncome=0, yoIncome=0, commission=0, outongTotal=0;\n      if(job.type === 'กดบัตร'){\n        total = I*300 + M + N;\n        ouyIncome = J*200;\n        yoIncome = K*200;\n        commission = (J+K)*100;\n        outongTotal = L*300 + M + N + commission;\n      } else if(job.type === 'กรอกฟอร์ม'){\n        total = I*150 + M + N;\n        outongTotal = I*150 + M + N;\n      }\n      return { total, ouyIncome, yoIncome, commission, outongTotal, avgOutong: outongTotal/2 };\n    }\n\n    function toThaiDate(iso){\n      if(!iso) return '-';\n      const d = new Date(iso + 'T00:00:00');\n      return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;\n    }\n    function monthKey(iso){ return iso ? iso.slice(0,7) : ''; }\n    function monthLabel(key){\n      const [y,m] = key.split('-');\n      return `${THAI_MONTHS[parseInt(m,10)-1]} ${parseInt(y,10)+543}`;\n    }\n\n    async function loadJobs(){\n      try{ const v = localStorage.getItem(STORAGE_KEY); jobs = v ? JSON.parse(v) : []; }\n      catch(e){ jobs = []; }\n    }\n    async function saveJobs(){\n      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs)); }\n      catch(e){ showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง'); }\n    }\n    async function loadSettlements(){\n      try{ const v = localStorage.getItem(SETTLE_KEY); settlements = v ? JSON.parse(v) : {}; }\n      catch(e){ settlements = {}; }\n    }\n    async function saveSettlements(){\n      try{ localStorage.setItem(SETTLE_KEY, JSON.stringify(settlements)); }\n      catch(e){ showToast('บันทึกสถานะการโอนไม่สำเร็จ'); }\n    }\n    async function toggleSettlement(iso){\n      settlements[iso] = !settlements[iso];\n      await saveSettlements();\n      showToast(settlements[iso] ? 'มาร์คว่าโอนแล้ว ✓' : 'ยกเลิกการมาร์คโอนแล้ว');\n      renderCalendar();\n    }\n\n    function showToast(msg){\n      const t = $('toast');\n      t.textContent = msg;\n      t.classList.add('show');\n      clearTimeout(showToast._t);\n      showToast._t = setTimeout(()=> t.classList.remove('show'), 2200);\n    }\n\n    function sundayOfCurrentWeek(){\n      const d = new Date(); d.setHours(0,0,0,0);\n      const add = (7 - d.getDay()) % 7;\n      d.setDate(d.getDate() + add);\n      return isoLocal(d);\n    }\n    function updateWeekStrip(){\n      const sun = sundayOfCurrentWeek();\n      const wk = weekSumsForSunday(sun);\n      $('wsTotal').textContent = baht(wk.ouy + wk.yo + wk.tongAo * 2);\n      $('wsOuy').textContent = baht(wk.ouy);\n      $('wsYo').textContent = baht(wk.yo);\n      $('wsTong').textContent = baht(wk.tongAo);\n      $('wsAo').textContent = baht(wk.tongAo);\n      const end = new Date(sun + 'T00:00:00');\n      const start = new Date(end); start.setDate(start.getDate() - 6);\n      const fmt = (dt)=> `${dt.getDate()}/${dt.getMonth()+1}`;\n      $('wsRange').textContent = `${fmt(start)} – ${fmt(end)}`;\n    }\n    function openAddWithDate(iso){\n      openAdd();\n      if(iso) $('f_date').value = iso;\n    }\n    function updateConfirmBtn(){\n      const b = $('c_confirmBtn');\n      if(!b) return;\n      b.classList.toggle('on', editingClientConfirmed);\n      b.textContent = editingClientConfirmed ? '✓ คอนเฟิร์มเรียบร้อย พร้อมส่งต่อแล้ว' : '⬜ จิ้มเมื่อคอนเฟิร์มเรียบร้อย พร้อมส่งต่อ';\n    }\n    function startPresence(){\n      const el = $('liveCount');\n      if(!el) return;\n      let n = 1 + Math.floor(Math.random()*3);\n      el.textContent = n;\n      if(startPresence._t) clearInterval(startPresence._t);\n      startPresence._t = setInterval(()=>{\n        n = Math.min(7, Math.max(1, n + (Math.random() < 0.5 ? -1 : 1)));\n        el.textContent = n;\n      }, 5000);\n    }\n\n    function getFiltered(){\n      const month = $('filterMonth').value;\n      const type = $('filterType').value;\n      const result = $('filterResult').value;\n      const search = $('searchBox').value.trim().toLowerCase();\n      return jobs.filter(j=>{\n        if(selectedDate){ if(j.date !== selectedDate) return false; }\n        else if(month && monthKey(j.date) !== month) return false;\n        if(type && j.type !== type) return false;\n        if(result && j.result !== result) return false;\n        if(search && !(j.event||'').toLowerCase().includes(search)) return false;\n        return true;\n      }).sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.time||'').localeCompare(a.time||''));\n    }\n\n    function populateMonthFilter(){\n      const sel = $('filterMonth');\n      const current = sel.value;\n      const keys = Array.from(new Set(jobs.map(j=>monthKey(j.date)).filter(Boolean))).sort().reverse();\n      sel.innerHTML = '<option value=\"\">ทั้งหมด<\u002Foption>' + keys.map(k=>`<option value=\"${k}\">${monthLabel(k)}<\u002Foption>`).join('');\n      if(keys.includes(current)) sel.value = current;\n    }\n\n    function populateEventList(){\n      const dl = $('eventList');\n      const names = Array.from(new Set(jobs.map(j=>j.event).filter(Boolean)));\n      dl.innerHTML = names.map(n=>`<option value=\"${n.replace(/\"/g,'&quot;')}\">`).join('');\n    }\n\n    function resultBadge(r){\n      if(r === 'ได้') return '<span class=\"badge badge-y\">ได้<\u002Fspan>';\n      if(r === 'coming') return '<span class=\"badge badge-c\">coming<\u002Fspan>';\n      return '<span class=\"badge badge-n\">ไม่ได้<\u002Fspan>';\n    }\n    function typeBadge(t){\n      return t === 'กดบัตร' ? '<span class=\"badge badge-bid\">กดบัตร<\u002Fspan>' : '<span class=\"badge badge-form\">กรอกฟอร์ม<\u002Fspan>';\n    }\n\n    function render(){\n      const filtered = getFiltered();\n      let sumTotal=0, sumBid=0, sumForm=0, sumOuyYo=0, sumComm=0, countDone=0, countComing=0;\n      filtered.forEach(j=>{\n        const c = calc(j);\n        sumTotal += c.total;\n        if(j.type === 'กดบัตร') sumBid += c.total; else sumForm += c.total;\n        sumOuyYo += c.ouyIncome + c.yoIncome;\n        sumComm += c.commission;\n        if(j.result === 'ได้') countDone++;\n        if(j.result === 'coming') countComing++;\n      });\n\n      $('heroTotal').textContent = Math.round(sumTotal).toLocaleString('th-TH');\n      $('stCount').textContent = filtered.length;\n      $('stDone').textContent = countDone;\n      $('stComing').textContent = countComing;\n      $('ticketNo').textContent = String(jobs.length).padStart(4,'0');\n      $('chipBid').textContent = baht(sumBid);\n      $('chipForm').textContent = baht(sumForm);\n      $('chipOuyYo').textContent = baht(sumOuyYo);\n      $('chipComm').textContent = baht(sumComm);\n      updateWeekStrip();\n\n      const monthVal = $('filterMonth').value;\n      if(selectedDate){\n        $('heroPeriod').textContent = 'วันที่ ' + toThaiDate(selectedDate);\n      } else {\n        $('heroPeriod').textContent = monthVal ? monthLabel(monthVal) : 'แสดงข้อมูลทั้งหมด';\n      }\n      $('periodLabelInline').textContent = '';\n\n      const tbody = $('tbody');\n      tbody.innerHTML = '';\n      $('emptyState').classList.toggle('hidden', filtered.length !== 0);\n\n      filtered.forEach(j=>{\n        const c = calc(j);\n        const main = document.createElement('tr');\n        main.className = 'job-row';\n        main.innerHTML = `\n          <td><div class=\"date-main\">${toThaiDate(j.date)}<\u002Fdiv><div class=\"date-sub\">${j.time||''}<\u002Fdiv><\u002Ftd>\n          <td><div class=\"ev-name\">${escapeHtml(j.event)||'-'}<\u002Fdiv>${j.type==='กดบัตร' && j.website ? `<div class=\"ev-site\">${escapeHtml(j.website)}<\u002Fdiv>` : ''}<\u002Ftd>\n          <td>${typeBadge(j.type)}<\u002Ftd>\n          <td>${resultBadge(j.result)}<\u002Ftd>\n          <td>${num(j.tickets)}<\u002Ftd>\n          <td class=\"amt amt-strong\">${baht(c.total)}<\u002Ftd>\n          <td class=\"amt\">${baht(c.outongTotal)}<\u002Ftd>\n          <td class=\"amt\">${baht(c.avgOutong)}<\u002Ftd>\n          <td>\n            <div class=\"actions\">\n              <button class=\"icon-btn\" data-edit=\"${j.id}\" title=\"แก้ไข\">✎<\u002Fbutton>\n              <button class=\"icon-btn\" data-del=\"${j.id}\" title=\"ลบ\">🗑<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Ftd>`;\n        tbody.appendChild(main);\n\n        const detail = document.createElement('tr');\n        detail.className = 'detail-row hidden';\n        detail.id = 'detail-' + j.id;\n        detail.innerHTML = `<td colspan=\"9\"><div class=\"detail-grid\">\n            <div class=\"d\">จำนวนลูกค้า<b>${num(j.customers)}<\u002Fb><\u002Fdiv>\n            ${j.type==='กดบัตร' ? `\n            <div class=\"d\">ออย (ใบ)<b>${num(j.ouy)} · ${baht(c.ouyIncome)}<\u002Fb><\u002Fdiv>\n            <div class=\"d\">โย (ใบ)<b>${num(j.yo)} · ${baht(c.yoIncome)}<\u002Fb><\u002Fdiv>\n            <div class=\"d\">ออ+ตองรวม (ใบ)<b>${num(j.outong)}<\u002Fb><\u002Fdiv>\n            <div class=\"d\">commission<b>${baht(c.commission)}<\u002Fb><\u002Fdiv>` : ''}\n            <div class=\"d\">ยกเลิก<b>${baht(num(j.cancel))}<\u002Fb><\u002Fdiv>\n            <div class=\"d\">tip<b>${baht(num(j.tip))}<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        ${(j.type==='กดบัตร' && (j.clients||[]).length) ? `\n        <div class=\"d\" style=\"margin-top:12px;\">รายชื่อลูกค้า\n          <div class=\"client-detail-list\">\n            ${j.clients.map(cl=>`\n              <div class=\"client-row\">\n                <span class=\"cl-name\">${escapeHtml(cl.name)||'(ไม่มีชื่อ)'}<\u002Fspan>\n                <span class=\"badge ${cl.source==='Line OA'?'badge-line':'badge-x'}\">${escapeHtml(cl.source||'X')}<\u002Fspan>\n                <button type=\"button\" class=\"cl-confirm ${cl.confirmed?'on':''}\" data-confirm-job=\"${j.id}\" data-confirm-client=\"${cl.id}\">${cl.confirmed?'✓ คอนเฟิร์มแล้ว':'จิ้มเพื่อคอนเฟิร์ม'}<\u002Fbutton>\n                <button type=\"button\" class=\"icon-btn\" data-copy-job=\"${j.id}\" data-copy-client=\"${cl.id}\" title=\"คัดลอก confirmation\">📋<\u002Fbutton>\n              <\u002Fdiv>`).join('')}\n          <\u002Fdiv>\n        <\u002Fdiv>` : ''}\n        <\u002Ftd>`;\n        tbody.appendChild(detail);\n\n        main.addEventListener('click', (e)=>{\n          if(e.target.closest('.icon-btn')) return;\n          detail.classList.toggle('hidden');\n        });\n      });\n\n      tbody.querySelectorAll('[data-edit]').forEach(btn=>{\n        btn.addEventListener('click', (e)=>{ e.stopPropagation(); openEdit(btn.dataset.edit); });\n      });\n      tbody.querySelectorAll('[data-del]').forEach(btn=>{\n        btn.addEventListener('click', (e)=>{ e.stopPropagation(); askDelete(btn.dataset.del); });\n      });\n      tbody.querySelectorAll('[data-copy-client]').forEach(btn=>{\n        btn.addEventListener('click', (e)=>{\n          e.stopPropagation();\n          copyClientNoteById(btn.dataset.copyJob, btn.dataset.copyClient);\n        });\n      });\n      tbody.querySelectorAll('[data-confirm-client]').forEach(btn=>{\n        btn.addEventListener('click', async (e)=>{\n          e.stopPropagation();\n          const job = jobs.find(x=>x.id===btn.dataset.confirmJob);\n          const cl = job && (job.clients||[]).find(c=>c.id===btn.dataset.confirmClient);\n          if(!cl) return;\n          cl.confirmed = !cl.confirmed;\n          await saveJobs();\n          btn.classList.toggle('on', cl.confirmed);\n          btn.textContent = cl.confirmed ? '✓ คอนเฟิร์มแล้ว' : 'จิ้มเพื่อคอนเฟิร์ม';\n          showToast(cl.confirmed ? 'คอนเฟิร์มเรียบร้อย ✓ พร้อมส่งต่อ' : 'ยกเลิกคอนเฟิร์มแล้ว');\n        });\n      });\n\n      populateMonthFilter();\n      populateEventList();\n      renderCalendar();\n    }\n\n    function escapeHtml(s){\n      if(!s) return '';\n      return s.replace(/[&<>\"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n    }\n\n    function isoLocal(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }\n    function todayIso(){ return isoLocal(new Date()); }\n\n    function parseTimeMinutes(t){\n      if(!t) return null;\n      const mt = String(t).match(/^(\\d{1,2}):(\\d{2})/);\n      if(!mt) return null;\n      return parseInt(mt[1],10)*60 + parseInt(mt[2],10);\n    }\n    function sortJobsByTime(list){\n      return list.slice().sort((a,b)=>{\n        const ta = parseTimeMinutes(a.time), tb = parseTimeMinutes(b.time);\n        if(ta===null && tb===null) return 0;\n        if(ta===null) return 1;\n        if(tb===null) return -1;\n        return ta - tb;\n      });\n    }\n\n    function shiftCalMonth(delta){\n      let [y,m] = calMonth.split('-').map(Number);\n      m += delta;\n      if(m < 1){ m = 12; y -= 1; }\n      else if(m > 12){ m = 1; y += 1; }\n      calMonth = `${y}-${String(m).padStart(2,'0')}`;\n      renderCalendar();\n    }\n\n    function weekSumsForSunday(sundayIso){\n      const end = new Date(sundayIso + 'T00:00:00');\n      const start = new Date(end);\n      start.setDate(start.getDate() - 6);\n      const type = $('filterType').value;\n      const result = $('filterResult').value;\n      const search = $('searchBox').value.trim().toLowerCase();\n      let ouy = 0, yo = 0, tongAo = 0;\n      jobs.forEach(j=>{\n        if(!j.date) return;\n        if(type && j.type !== type) return;\n        if(result && j.result !== result) return;\n        if(search && !(j.event||'').toLowerCase().includes(search)) return;\n        const d = new Date(j.date + 'T00:00:00');\n        if(d < start || d > end) return;\n        const c = calc(j);\n        ouy += c.ouyIncome;\n        yo += c.yoIncome;\n        tongAo += c.avgOutong;\n      });\n      return { ouy, yo, tongAo };\n    }\n\n    function renderCalendar(){\n      const [y, m] = calMonth.split('-').map(Number);\n      $('calTitle').textContent = monthLabel(calMonth);\n\n      const type = $('filterType').value;\n      const result = $('filterResult').value;\n      const search = $('searchBox').value.trim().toLowerCase();\n      const byDate = {};\n      jobs.forEach(j=>{\n        if(!j.date) return;\n        if(type && j.type !== type) return;\n        if(result && j.result !== result) return;\n        if(search && !(j.event||'').toLowerCase().includes(search)) return;\n        (byDate[j.date] = byDate[j.date] || []).push(j);\n      });\n\n      const dow = ['อา','จ','อ','พ','พฤ','ศ','ส'];\n      const firstDow = new Date(y, m-1, 1).getDay();\n      const daysInMonth = new Date(y, m, 0).getDate();\n      const today = todayIso();\n\n      let html = dow.map(d=>`<div class=\"cal-dow\">${d}<\u002Fdiv>`).join('');\n      for(let i=0; i<firstDow; i++) html += '<div class=\"cal-cell empty\"><\u002Fdiv>';\n\n      for(let day=1; day<=daysInMonth; day++){\n        const iso = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;\n        const dayJobs = sortJobsByTime(byDate[iso] || []);\n        const isSunday = new Date(y, m-1, day).getDay() === 0;\n\n        let jobsHtml = '', avgHtml = '', settleHtml = '';\n        if(dayJobs.length){\n          const shown = dayJobs.slice(0,3);\n          jobsHtml = '<div class=\"cal-jobs\">' + shown.map(j=>{\n            const label = `${j.time ? j.time+' · ' : ''}${j.type||''} · ${j.event||'(ไม่มีชื่อ)'}`;\n            return `<div class=\"cal-job-pill ${j.type==='กดบัตร'?'bid':'form'}\" data-job-id=\"${j.id}\" tabindex=\"0\" role=\"button\" title=\"${escapeHtml(label)} (กดเพื่อแก้ไข)\">${escapeHtml(label)}<\u002Fdiv>`;\n          }).join('') + (dayJobs.length>3 ? `<div class=\"cal-job-more\">+${dayJobs.length-3} งานอื่น<\u002Fdiv>` : '') + '<\u002Fdiv>';\n          const avgSum = dayJobs.reduce((s,j)=> s + calc(j).avgOutong, 0);\n          avgHtml = `<div class=\"cal-avg-tag\">เฉลี่ยตอง/ออ ${baht(avgSum)}<\u002Fdiv>`;\n        }\n        if(isSunday){\n          const wk = weekSumsForSunday(iso);\n          const settled = !!settlements[iso];\n          settleHtml = `<div class=\"cal-settle\">\n              <div class=\"cal-settle-amt\">🧾 เคลียร์ยอดรวม ${baht(wk.ouy + wk.yo + wk.tongAo*2)}<\u002Fdiv>\n              <button type=\"button\" class=\"cal-settle-btn ${settled?'settled':'pending'}\" data-settle=\"${iso}\">${settled ? '✓ โอนแล้ว' : 'ยังไม่โอน'}<\u002Fbutton>\n            <\u002Fdiv>`;\n        }\n\n        const classes = ['cal-cell'];\n        if(iso === today) classes.push('today');\n        if(iso === selectedDate) classes.push('selected');\n        if(isSunday) classes.push('sunday');\n        const ariaLabel = `${day} ${monthLabel(calMonth)}` + (dayJobs.length ? ` มี ${dayJobs.length} งาน` : '') + (isSunday ? ' วันเคลียร์ยอด' : '');\n\n        html += `<div class=\"${classes.join(' ')}\" data-date=\"${iso}\" tabindex=\"0\" role=\"button\" aria-label=\"${ariaLabel}\">\n            <div class=\"cal-date-row\">\n              <span class=\"cal-date\">${day}<\u002Fspan>\n              <div class=\"cal-date-right\">\n                ${isSunday ? '<span class=\"cal-sun-tag\">เคลียร์ยอด<\u002Fspan>' : ''}\n                <button type=\"button\" class=\"cal-add\" data-add-date=\"${iso}\" title=\"สร้างงานวันนี้\" aria-label=\"สร้างงานวันที่ ${day}\">+<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            ${jobsHtml}\n            ${avgHtml}\n            ${settleHtml}\n          <\u002Fdiv>`;\n      }\n\n      $('calGrid').innerHTML = html;\n      $('calGrid').querySelectorAll('.cal-cell[data-date]').forEach(cell=>{\n        const toggle = ()=>{\n          const d = cell.dataset.date;\n          selectedDate = (selectedDate === d) ? null : d;\n          render();\n        };\n        cell.addEventListener('click', toggle);\n        cell.addEventListener('keydown', (e)=>{\n          if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); }\n        });\n      });\n      $('calGrid').querySelectorAll('[data-settle]').forEach(btn=>{\n        btn.addEventListener('click', (e)=>{\n          e.stopPropagation();\n          toggleSettlement(btn.dataset.settle);\n        });\n      });\n      $('calGrid').querySelectorAll('[data-add-date]').forEach(btn=>{\n        btn.addEventListener('click', (e)=>{ e.stopPropagation(); openAddWithDate(btn.dataset.addDate); });\n      });\n      $('calGrid').querySelectorAll('.cal-job-pill[data-job-id]').forEach(pill=>{\n        const goEdit = (e)=>{ e.stopPropagation(); openEdit(pill.dataset.jobId); };\n        pill.addEventListener('click', goEdit);\n        pill.addEventListener('keydown', (e)=>{\n          if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); goEdit(e); }\n        });\n      });\n      $('calClear').classList.toggle('hidden', !selectedDate);\n    }\n\n    function setType(t){\n      $('typeOptBid').classList.toggle('active-bid', t==='กดบัตร');\n      $('typeOptForm').classList.toggle('active-form', t==='กรอกฟอร์ม');\n      $('typeOptBid').dataset.active = (t==='กดบัตร') ? '1' : '0';\n      $('typeOptForm').dataset.active = (t==='กรอกฟอร์ม') ? '1' : '0';\n      $('websiteField').classList.toggle('hidden', t!=='กดบัตร');\n      $('ouyField').classList.toggle('hidden', t!=='กดบัตร');\n      $('yoField').classList.toggle('hidden', t!=='กดบัตร');\n      $('outongField').classList.toggle('hidden', t!=='กดบัตร');\n      $('customersNumField').classList.toggle('hidden', t==='กดบัตร');\n      $('clientsField').classList.toggle('hidden', t!=='กดบัตร');\n      updatePreview();\n    }\n    function currentType(){\n      return $('typeOptBid').dataset.active === '1' ? 'กดบัตร' : 'กรอกฟอร์ม';\n    }\n\n    function renderClientsList(){\n      $('clientsCountLabel').textContent = editingClients.length ? `(${editingClients.length} คน)` : '';\n      const list = $('clientsList');\n      if(!editingClients.length){\n        list.innerHTML = '<div class=\"clients-empty\">ยังไม่มีลูกค้า กดปุ่มด้านล่างเพื่อเพิ่ม<\u002Fdiv>';\n        return;\n      }\n      list.innerHTML = editingClients.map(c=>`\n        <div class=\"client-row\">\n          <span class=\"cl-name\">${escapeHtml(c.name)||'(ไม่มีชื่อ)'}<\u002Fspan>\n          <span class=\"badge ${c.source==='Line OA'?'badge-line':'badge-x'}\">${escapeHtml(c.source||'X')}<\u002Fspan>\n          <button type=\"button\" class=\"cl-confirm ${c.confirmed?'on':''}\" data-client-confirm=\"${c.id}\">${c.confirmed?'✓ คอนเฟิร์มแล้ว':'จิ้มเพื่อคอนเฟิร์ม'}<\u002Fbutton>\n          <span class=\"cl-note-flag\">${c.note && c.note.trim() ? '✓ มี confirmation' : 'ยังไม่มี'}<\u002Fspan>\n          <div class=\"actions\">\n            <button type=\"button\" class=\"icon-btn\" data-client-edit=\"${c.id}\" title=\"แก้ไข\">✎<\u002Fbutton>\n            <button type=\"button\" class=\"icon-btn\" data-client-del=\"${c.id}\" title=\"ลบ\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>`).join('');\n      list.querySelectorAll('[data-client-edit]').forEach(btn=>{\n        btn.addEventListener('click', ()=> openClientEditor(btn.dataset.clientEdit));\n      });\n      list.querySelectorAll('[data-client-confirm]').forEach(btn=>{\n        btn.addEventListener('click', ()=>{\n          const c = editingClients.find(x=>x.id===btn.dataset.clientConfirm);\n          if(c){ c.confirmed = !c.confirmed; renderClientsList(); }\n        });\n      });\n      list.querySelectorAll('[data-client-del]').forEach(btn=>{\n        btn.addEventListener('click', ()=>{\n          editingClients = editingClients.filter(c=>c.id !== btn.dataset.clientDel);\n          renderClientsList();\n        });\n      });\n    }\n\n    function openClientEditor(id){\n      editingClientId = id || null;\n      const c = id ? editingClients.find(x=>x.id===id) : null;\n      $('clientFormTitle').textContent = c ? 'แก้ไขลูกค้า' : 'เพิ่มลูกค้า';\n      $('c_name').value = c ? c.name : '';\n      $('c_source').value = c ? (c.source || 'X') : 'X';\n      $('c_note').value = c ? (c.note || '') : '';\n      $('clientDeleteBtn').classList.toggle('hidden', !c);\n      editingClientConfirmed = c ? !!c.confirmed : false;\n      updateConfirmBtn();\n      $('clientOverlay').classList.add('show');\n    }\n    function closeClientEditor(){ $('clientOverlay').classList.remove('show'); }\n\n    function saveClientEditor(){\n      const name = $('c_name').value.trim();\n      if(!name){ showToast('กรุณากรอกชื่อลูกค้า'); return; }\n      const data = { id: editingClientId || genId(), name, source: $('c_source').value, note: $('c_note').value, confirmed: editingClientConfirmed };\n      if(editingClientId){\n        const idx = editingClients.findIndex(c=>c.id===editingClientId);\n        if(idx>-1) editingClients[idx] = data;\n      } else {\n        editingClients.push(data);\n      }\n      closeClientEditor();\n      renderClientsList();\n    }\n\n    function deleteClientFromEditor(){\n      if(editingClientId) editingClients = editingClients.filter(c=>c.id !== editingClientId);\n      closeClientEditor();\n      renderClientsList();\n    }\n\n    async function copyClientNote(){\n      const text = $('c_note').value;\n      if(!text.trim()){ showToast('ยังไม่มี confirmation ให้คัดลอก'); return; }\n      try{ await navigator.clipboard.writeText(text); showToast('คัดลอก confirmation แล้ว'); }\n      catch(e){ showToast('คัดลอกไม่สำเร็จ ลองคัดลอกด้วยตนเอง'); }\n    }\n\n    async function copyClientNoteById(jobId, clientId){\n      const job = jobs.find(x=>x.id===jobId);\n      const cl = job && (job.clients||[]).find(c=>c.id===clientId);\n      if(!cl || !cl.note || !cl.note.trim()){ showToast('ยังไม่มี confirmation ให้คัดลอก'); return; }\n      try{ await navigator.clipboard.writeText(cl.note); showToast('คัดลอก confirmation แล้ว'); }\n      catch(e){ showToast('คัดลอกไม่สำเร็จ ลองคัดลอกด้วยตนเอง'); }\n    }\n\n    function updatePreview(){\n      const job = {\n        type: currentType(),\n        tickets: $('f_tickets').value, ouy: $('f_ouy').value, yo: $('f_yo').value,\n        outong: $('f_outong').value, cancel: $('f_cancel').value, tip: $('f_tip').value\n      };\n      const c = calc(job);\n      $('pv_total').textContent = baht(c.total);\n      $('pv_comm').textContent = baht(c.commission);\n      $('pv_outong').textContent = baht(c.outongTotal);\n      $('pv_ouy').textContent = baht(c.ouyIncome);\n      $('pv_yo').textContent = baht(c.yoIncome);\n      $('pv_avg').textContent = baht(c.avgOutong);\n    }\n\n    function openAdd(){\n      editingId = null;\n      $('formTitle').textContent = 'เพิ่มงานใหม่';\n      $('f_date').value = todayIso();\n      $('f_time').value = '';\n      $('f_event').value = '';\n      $('f_website').value = '';\n      $('f_customers').value = 1;\n      $('f_result').value = 'coming';\n      $('f_tickets').value = 0;\n      $('f_ouy').value = 0;\n      $('f_yo').value = 0;\n      $('f_outong').value = 0;\n      $('f_cancel').value = 0;\n      $('f_tip').value = 0;\n      editingClients = [];\n      editingClientId = null;\n      renderClientsList();\n      setType('กดบัตร');\n      $('formOverlay').classList.add('show');\n    }\n    function openEdit(id){\n      const j = jobs.find(x=>x.id===id);\n      if(!j) return;\n      editingId = id;\n      $('formTitle').textContent = 'แก้ไขงาน';\n      $('f_date').value = j.date || '';\n      $('f_time').value = j.time || '';\n      $('f_event').value = j.event || '';\n      $('f_website').value = j.website || '';\n      $('f_customers').value = num(j.customers);\n      $('f_result').value = j.result || 'coming';\n      $('f_tickets').value = num(j.tickets);\n      $('f_ouy').value = num(j.ouy);\n      $('f_yo').value = num(j.yo);\n      $('f_outong').value = num(j.outong);\n      $('f_cancel').value = num(j.cancel);\n      $('f_tip').value = num(j.tip);\n      editingClients = (j.clients || []).map(c=>({...c}));\n      editingClientId = null;\n      renderClientsList();\n      setType(j.type || 'กดบัตร');\n      $('formOverlay').classList.add('show');\n    }\n    function closeForm(){ $('formOverlay').classList.remove('show'); }\n\n    async function saveForm(){\n      const event = $('f_event').value.trim();\n      if(!event){ showToast('กรุณากรอกชื่องาน'); return; }\n      const job = {\n        id: editingId || genId(),\n        type: currentType(),\n        date: $('f_date').value,\n        time: $('f_time').value.trim(),\n        event,\n        website: $('f_website').value.trim(),\n        customers: currentType()==='กดบัตร' ? editingClients.length : $('f_customers').value,\n        clients: currentType()==='กดบัตร' ? editingClients.map(c=>({...c})) : [],\n        result: $('f_result').value,\n        tickets: $('f_tickets').value,\n        ouy: $('f_ouy').value,\n        yo: $('f_yo').value,\n        outong: $('f_outong').value,\n        cancel: $('f_cancel').value,\n        tip: $('f_tip').value\n      };\n      if(editingId){\n        const idx = jobs.findIndex(x=>x.id===editingId);\n        if(idx>-1) jobs[idx] = job;\n      } else {\n        jobs.push(job);\n      }\n      await saveJobs();\n      closeForm();\n      render();\n      showToast('บันทึกงานสำเร็จ');\n    }\n\n    function askDelete(id){\n      pendingDeleteId = id; pendingReset = false;\n      $('confirmTitle').textContent = 'ลบงานนี้?';\n      $('confirmMsg').textContent = 'ต้องการลบงานนี้หรือไม่ การลบไม่สามารถย้อนกลับได้';\n      $('confirmOverlay').classList.add('show');\n    }\n    function askReset(){\n      pendingReset = true; pendingDeleteId = null;\n      $('confirmTitle').textContent = 'ล้างข้อมูลทั้งหมด?';\n      $('confirmMsg').textContent = 'งานทุกรายการที่บันทึกไว้จะถูกลบทั้งหมด และไม่สามารถย้อนกลับได้';\n      $('confirmOverlay').classList.add('show');\n    }\n    async function confirmOk(){\n      if(pendingDeleteId){\n        jobs = jobs.filter(j=>j.id!==pendingDeleteId);\n        await saveJobs();\n        render();\n        showToast('ลบงานแล้ว');\n      } else if(pendingReset){\n        jobs = [];\n        await saveJobs();\n        render();\n        showToast('ล้างข้อมูลทั้งหมดแล้ว');\n      }\n      $('confirmOverlay').classList.remove('show');\n    }\n\n    function exportCsv(){\n      const rows = getFiltered();\n      const header = ['วันที่','เวลา','event','ประเภทงาน','website','จำนวนลูกค้า','ผลลัพธ์','จำนวนใบที่ได้','ออย','โย','ออ+ตองรวม','ยกเลิก','tip','รายได้ทั้งหมด','รายได้ออย','รายได้โย','commission','รายได้รวมออ+ตอง','เฉลี่ยออ+ตอง'];\n      const lines = [header.join(',')];\n      rows.forEach(j=>{\n        const c = calc(j);\n        const line = [toThaiDate(j.date), j.time, j.event, j.type, j.website, num(j.customers), j.result,\n          num(j.tickets), num(j.ouy), num(j.yo), num(j.outong), num(j.cancel), num(j.tip),\n          Math.round(c.total), Math.round(c.ouyIncome), Math.round(c.yoIncome), Math.round(c.commission),\n          Math.round(c.outongTotal), Math.round(c.avgOutong)]\n          .map(v => `\"${String(v??'').replace(/\"/g,'\"\"')}\"`).join(',');\n        lines.push(line);\n      });\n      const blob = new Blob(['\\uFEFF' + lines.join('\\n')], {type:'text/csv;charset=utf-8;'});\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = 'shiningdream-jobs.csv';\n      document.body.appendChild(a); a.click(); document.body.removeChild(a);\n      URL.revokeObjectURL(url);\n    }\n\n    /* ---------- Wire up ---------- */\n    $('addBtn').addEventListener('click', openAdd);\n    $('formCloseBtn').addEventListener('click', closeForm);\n    $('formCancelBtn').addEventListener('click', closeForm);\n    $('formSaveBtn').addEventListener('click', saveForm);\n    $('typeOptBid').addEventListener('click', ()=>setType('กดบัตร'));\n    $('typeOptForm').addEventListener('click', ()=>setType('กรอกฟอร์ม'));\n    $('addClientBtn').addEventListener('click', ()=> openClientEditor(null));\n    $('clientCloseBtn').addEventListener('click', closeClientEditor);\n    $('clientCancelBtn').addEventListener('click', closeClientEditor);\n    $('clientSaveBtn').addEventListener('click', saveClientEditor);\n    $('clientCopyBtn').addEventListener('click', copyClientNote);\n    $('clientDeleteBtn').addEventListener('click', deleteClientFromEditor);\n    $('c_confirmBtn').addEventListener('click', ()=>{ editingClientConfirmed = !editingClientConfirmed; updateConfirmBtn(); });\n    $('clientOverlay').addEventListener('click', (e)=>{ if(e.target.id==='clientOverlay') closeClientEditor(); });\n    ['f_tickets','f_ouy','f_yo','f_outong','f_cancel','f_tip'].forEach(id=>{\n      $(id).addEventListener('input', updatePreview);\n    });\n    $('confirmCancelBtn').addEventListener('click', ()=> $('confirmOverlay').classList.remove('show'));\n    $('confirmOkBtn').addEventListener('click', confirmOk);\n    $('resetBtn').addEventListener('click', askReset);\n    $('exportBtn').addEventListener('click', exportCsv);\n    $('calPrev').addEventListener('click', ()=> shiftCalMonth(-1));\n    $('calNext').addEventListener('click', ()=> shiftCalMonth(1));\n    $('calToday').addEventListener('click', ()=>{ calMonth = todayIso().slice(0,7); renderCalendar(); });\n    $('calClear').addEventListener('click', ()=>{ selectedDate = null; render(); });\n    $('filterMonth').addEventListener('change', ()=>{ if($('filterMonth').value) calMonth = $('filterMonth').value; });\n    ['filterMonth','filterType','filterResult'].forEach(id=> $(id).addEventListener('change', render));\n    $('searchBox').addEventListener('input', render);\n    document.querySelectorAll('.step-btn').forEach(b=>{\n      b.addEventListener('click', ()=>{\n        const inp = document.getElementById(b.dataset.target);\n        if(!inp) return;\n        const step = parseInt(b.dataset.step,10) || 0;\n        let v = parseInt(inp.value || '0', 10); if(isNaN(v)) v = 0;\n        v = Math.max(0, v + step);\n        inp.value = v;\n        inp.dispatchEvent(new Event('input', { bubbles:true }));\n      });\n    });\n    $('formOverlay').addEventListener('click', (e)=>{ if(e.target.id==='formOverlay') closeForm(); });\n    $('confirmOverlay').addEventListener('click', (e)=>{ if(e.target.id==='confirmOverlay') $('confirmOverlay').classList.remove('show'); });\n\n    (async ()=>{\n      await loadJobs();\n      await loadSettlements();\n      render();\n      startPresence();\n    })();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
